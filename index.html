/* ─── MISC HELPERS ─── */
function pad2(n)   { return String(n).padStart(2,"0"); }
function ds(y,m,d) { return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function parse(s)  { if(!s||typeof s!=="string") return new Date(NaN); const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function dim(y,m)  { return new Date(y,m+1,0).getDate(); }
function today()   { const n=new Date(); return ds(n.getFullYear(),n.getMonth(),n.getDate()); }
function uid()     { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((e||'').trim()); }
function toInitials(name) {
  return name.trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('') || "?";
}
function getNextColor(team) {
  const used = new Set(team.map(m=>m.color));
  return COLOR_PALETTE.find(c=>!used.has(c)) || COLOR_PALETTE[team.length % COLOR_PALETTE.length];
}
function expand(s,e) {
  const days=[],cur=parse(s),stop=parse(e);
  if(isNaN(cur)||isNaN(stop)) return days;
  while(cur<=stop){ const d=new Date(cur); days.push(ds(d.getFullYear(),d.getMonth(),d.getDate())); cur.setDate(cur.getDate()+1); }
  return days;
}
function wdays(s,e) { return expand(s,e).filter(x=>{const d=parse(x).getDay();return d!==0&&d!==6;}).length; }
function fmt(s,e) {
  const a=parse(s),b=parse(e),o={day:"numeric",month:"short"},oy={day:"numeric",month:"short",year:"numeric"};
  return s===e ? a.toLocaleDateString("pt-PT",oy) : `${a.toLocaleDateString("pt-PT",o)} – ${b.toLocaleDateString("pt-PT",oy)}`;
}

/* ─── APP ─── */
function App() {
  if (!IS_CONFIGURED) return <SetupScreen />;

  // ── All hooks MUST be declared before any conditional early returns ──
  const [authUser,  setAuthUser]  = useState(undefined);
  const [team,      setTeam]      = useState(null);
  const [vacations, setVacations] = useState(null);
  const [online,    setOnline]    = useState(false);
  const [view,      setView]      = useState("team");
  const [year,      setYear]      = useState(2026);
  const [month,     setMonth]     = useState(()=>{ const n=new Date(); return n.getFullYear()===2026?n.getMonth():0; });
  const [modal,     setModal]     = useState(null);

  useEffect(() => { const u = auth.onAuthStateChanged(user => setAuthUser(user||null)); return u; }, []);
  useEffect(() => {
    if (!authUser) return;
    const teamRef = db.ref("team");
    teamRef.once("value", snap => {
      if (!snap.val()) {
        const seed = {}; DEFAULT_TEAM.forEach(m => { const id=uid(); seed[id]={...m,id}; }); teamRef.set(seed);
      } else {
        Object.values(snap.val()).forEach(m => { if (EMAIL_MIGRATION[m.name] && !m.email) db.ref(`team/${m.id}/email`).set(EMAIL_MIGRATION[m.name]); });
      }
    });
    const tH = snap => { setTeam(Object.values(snap.val()||{}).sort((a,b)=>a.name.localeCompare(b.name))); setOnline(true); };
    teamRef.on("value", tH, ()=>setOnline(false));
    const vH = snap => setVacations(Object.values(snap.val()||{}));
    db.ref("vacations").on("value", vH);
    return () => { teamRef.off("value",tH); db.ref("vacations").off("value",vH); };
  }, [authUser]);
  useEffect(() => { const h=e=>{if(e.key==="Escape")setModal(null);}; window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h); }, []);

  // Compute role + pendingCount HERE — before any early returns — so hook call order is always the same
  const role = authUser ? getUserRole(authUser.email) : 'member';
  const pendingCount = useMemo(() => {
    if (!vacations || role === 'member') return 0;
    return vacations.filter(v => v.status === 'pending' && (role !== 'mini-admin' || v.member !== TIAGO_NAME)).length;
  }, [vacations, role]);

  // ── Early returns (after all hooks) ──
  if (authUser === undefined) return <div className="loading" style={{minHeight:"100vh"}}><div className="spinner"/><div>A carregar…</div></div>;
  if (authUser === null) return <LoginScreen />;
  if (!team || !vacations) return (
    <div>
      <nav className="nav"><div className="nav-logo">🌴 <span className="accent">Vacation</span> Tracker</div><AuthUserPill user={authUser}/></nav>
      <div className="loading"><div className="spinner"/><div>A ligar…</div></div>
    </div>
  );

  // Whitelist check
  const allAllowed = [...new Set([...team.filter(m=>m.email).map(m=>m.email.toLowerCase()), HIDDEN_ADMIN_EMAIL])];
  if (allAllowed.length > 0 && !allAllowed.includes(authUser.email.toLowerCase())) return <AccessDeniedScreen email={authUser.email}/>;

  const prevMonth = ()=>{ if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); };
  const nextMonth = ()=>{ if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); };
  const saveVacation = (data) => {
    let d = {...data};
    if (d.member === TIAGO_NAME && modal.mode === 'add') d.status = 'approved';
    if (modal.mode === "edit") {
      db.ref(`vacations/${d.id}`).set(d);
    } else {
      const v = {...d, id: uid()};
      db.ref(`vacations/${v.id}`).set(v);
      if (v.member !== TIAGO_NAME) notifyNewRequest(v);
    }
    setModal(null);
  };
  const deleteVacation = (id) => { if(window.confirm("Eliminar este registo de férias?")) db.ref(`vacations/${id}`).remove(); };
  const cycleStatus = (id) => {
    const v = vacations.find(x=>x.id===id);
    if (!v || !canApprove(authUser.email, v.member)) return;
    const newStatus = NEXT_STATUS[v.status];
    db.ref(`vacations/${id}/status`).set(newStatus);
    if (newStatus === 'approved') notifyApproval(v, authUser.email, team);
  };
  const approveVacation = (id) => {
    const v = vacations.find(x=>x.id===id);
    if (!v || !canApprove(authUser.email, v.member)) return;
    db.ref(`vacations/${id}/status`).set('approved');
    notifyApproval(v, authUser.email, team);
  };
  const rejectVacation = (id) => {
    const v = vacations.find(x=>x.id===id);
    if (!v || !canApprove(authUser.email, v.member)) return;
    db.ref(`vacations/${id}/status`).set('rejected');
  };
  const addMember         = (name,color,email) => { const id=uid(); db.ref(`team/${id}`).set({id,name:name.trim(),color,initials:toInitials(name),email:email.trim().toLowerCase()}); };
  const removeMember      = (member) => {
    const vc=(vacations||[]).filter(v=>v.member===member.name).length;
    const msg=vc>0?`Remover ${member.name}? Tem ${vc} registo${vc!==1?"s":""} de férias.\n\nOK = remover membro E todos os seus registos.\nCancelar = abortar.`:`Remover ${member.name} da equipa?`;
    if(!window.confirm(msg)) return;
    db.ref(`team/${member.id}`).remove();
    if(vc>0)(vacations||[]).filter(v=>v.member===member.name).forEach(v=>db.ref(`vacations/${v.id}`).remove());
    if(view===member.name) setView("team");
  };
  const updateMemberColor = (member,color) => db.ref(`team/${member.id}/color`).set(color);
  const updateMemberEmail = (member,email) => db.ref(`team/${member.id}/email`).set(email.trim().toLowerCase());
  const openAdd  = (def) => setModal({mode:"add",  userEmail:authUser.email, defaultMember:def||(view!=="team"&&view!=="manage"?view:(team&&team[0]?.name)||"")});
  const openEdit = (entry) => setModal({mode:"edit", userEmail:authUser.email, entry});
  const currentMember = team?.find(m=>m.name===view);
  return (
    <div>
      <nav className="nav">
        <div className="nav-logo">🌴 <span className="accent">Vacation</span> Tracker<span className={`conn-dot ${online?"online":"offline"}`} title={online?"Sincronizado":"A reconectar…"} style={{marginLeft:4}}/></div>
        <div className="nav-divider"/>
        <div className={`nav-tab ${view==="team"?"active":""}`} onClick={()=>setView("team")}>
          <span>👥</span> Team
        </div>
        {pendingCount>0 && <div className={`nav-tab ${view==="pending"?"active":""}`} onClick={()=>setView("pending")} style={{color:"#dc2626"}}>
          <span className="pending-badge" style={{position:"static",fontSize:11}}>{pendingCount}</span> Pendentes
        </div>}
        <div className="nav-divider"/>
        {team.map(m=>(
          <div key={m.id} className={`nav-tab ${view===m.name?"active":""}`} onClick={()=>setView(m.name)}>
            <span className="nav-dot" style={{background:m.color}}/>{m.name.split(" ")[0]}
          </div>
        ))}
        <div className={`nav-tab manage-tab ${view==="manage"?"active":""}`} onClick={()=>setView("manage")}>⚙️ Members</div>
        <AuthUserPill user={authUser}/>
      </nav>
      <div className="main">
        {view==="team"    && <TeamView vacations={vacations} team={team} year={year} month={month} onPrev={prevMonth} onNext={nextMonth} onPersonClick={n=>setView(n)} onAdd={()=>openAdd(null)} userEmail={authUser.email} onCycleStatus={cycleStatus}/>}
        {view==="manage"  && <ManageTeamView team={team} vacations={vacations} onAdd={addMember} onRemove={removeMember} onColorChange={updateMemberColor} onEmailChange={updateMemberEmail} currentUserEmail={authUser.email}/>}
        {view==="pending" && <PendingListView vacations={vacations} team={team} userEmail={authUser.email} onApprove={approveVacation} onReject={rejectVacation} onDelete={deleteVacation} onBack={()=>setView("team")}/>}
        {view!=="team"&&view!=="manage"&&view!=="pending"&&currentMember && <PersonView member={currentMember} vacations={vacations.filter(v=>v.member===currentMember.name)} onAdd={()=>openAdd(currentMember.name)} onEdit={openEdit} onDelete={deleteVacation} onCycleStatus={cycleStatus} userEmail={authUser.email}/>}
      </div>
      {modal && <VacationModal mode={modal.mode} defaultMember={modal.defaultMember} entry={modal.entry} team={team} userEmail={modal.userEmail} onSave={saveVacation} onClose={()=>setModal(null)}/>}
    </div>
  );
}

  const [editColorFor, setEditColorFor] = useState(null);
  const [editEmailFor, setEditEmailFor] = useState(null);
  const [emailInput,   setEmailInput]   = useState("");
  const emailRef = useRef(null);
  const startEmailEdit = (m) => { setEditEmailFor(m); setEmailInput(m.email||""); setEditColorFor(null); setTimeout(()=>emailRef.current?.focus(),50); };
  const saveEmail = (m) => {
    if (!emailInput.trim()) return alert("Introduz um endereço de email.");
    if (!isValidEmail(emailInput)) return alert("Endereço de email inválido.");
    const dup = team.find(x=>x.id!==m.id&&x.email&&x.email.toLowerCase()===emailInput.trim().toLowerCase());
    if (dup) return alert(`Este email já está atribuído a ${dup.name}.`);
    onEmailChange(m,emailInput.trim().toLowerCase()); setEditEmailFor(null);
  };
  const missing = team.filter(m=>!m.email).length;
  const getRoleBadge = (m) => {
    if (m.email?.toLowerCase()===SUPER_ADMIN_EMAIL) return <span className="role-badge super">⭐ Super Admin</span>;
    if (m.email?.toLowerCase()===MINI_ADMIN_EMAIL)  return <span className="role-badge mini">🔑 Admin</span>;
    return null;
  };
  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">⚙️ Team Members</div>
          <div className="page-subtitle">{team.length} membro{team.length!==1?"s":""}{missing>0&&<span style={{color:"#b45309",marginLeft:8}}>· ⚠️ {missing} sem email</span>}</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>＋ Add Member</button>
      </div>
      {missing>0&&(
        <div className="info-box warning">
          <strong>⚠️ Endereços de email em falta</strong>
          {missing} membro{missing!==1?"s":""} ainda não {missing!==1?"têm":"tem"} email definido e não {missing!==1?"conseguem":"consegue"} iniciar sessão. Clica no aviso amarelo na linha do membro para adicionar.
        </div>
      )}
      {team.length===0 ? (
        <div className="empty"><div className="empty-icon">👤</div><div className="empty-title">Sem membros</div><div style={{marginTop:16}}><button className="btn btn-primary" onClick={()=>setShowAdd(true)}>＋ Adicionar</button></div></div>
      ) : (
        <div className="member-grid">
          {team.map(m=>{
            const vc=vacations.filter(v=>v.member===m.name).length;
            const wd=vacations.filter(v=>v.member===m.name).reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
            const isEC=editColorFor?.id===m.id, isEE=editEmailFor?.id===m.id;
            return (
              <div key={m.id} className="member-row">
                <div className="member-row-avatar" style={{background:m.color,outline:isEC?`3px solid ${m.color}`:"none",outlineOffset:2}} title="Clica para mudar cor" onClick={()=>{setEditColorFor(isEC?null:m);setEditEmailFor(null);}}>{m.initials}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div className="member-row-name">{m.name} {getRoleBadge(m)}</div>
                  <div className="member-row-meta">{vc} registo{vc!==1?"s":""} · {wd} dia{wd!==1?"s":""} útei{wd!==1?"s":"l"}</div>
                  {isEE ? (
                    <div className="email-inline-edit">
                      <input ref={emailRef} type="email" className="email-inline-input" value={emailInput} onChange={e=>setEmailInput(e.target.value)} placeholder="email@exemplo.com" onKeyDown={e=>{if(e.key==="Enter")saveEmail(m);if(e.key==="Escape")setEditEmailFor(null);}}/>
                      <button className="btn btn-primary" style={{padding:"7px 14px",fontSize:13}} onClick={()=>saveEmail(m)}>Guardar</button>
                      <button className="btn-cancel" style={{padding:"7px 12px",fontSize:13}} onClick={()=>setEditEmailFor(null)}>✕</button>
                    </div>
                  ) : (
                    <div style={{marginTop:4}}>
                      {m.email
                        ? <span className="email-badge">✉️ {m.email}<button className="email-edit-icon" onClick={()=>startEmailEdit(m)}>✏️</button></span>
                        : <span className="email-missing" onClick={()=>startEmailEdit(m)}>⚠️ Sem email — clica para adicionar</span>
                      }
                    </div>
                  )}
                  {isEC&&(
                    <div className="color-grid" style={{marginTop:10}}>
                      {COLOR_PALETTE.map(c=><div key={c} className={`color-swatch${m.color===c?" selected":""}`} style={{background:c}} onClick={()=>{onColorChange(m,c);setEditColorFor(null);}}/>)}
                    </div>
                  )}
                </div>
                <div className="member-row-actions"><button className="btn-danger-ghost" onClick={()=>onRemove(m)}>Remover</button></div>
              </div>
            );
          })}
        </div>
      )}
      {showAdd&&<AddMemberModal team={team} onAdd={(n,c,e)=>{onAdd(n,c,e);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}
/* ─── ADD MEMBER MODAL ─── */
function AddMemberModal({ team, onAdd, onClose }) {
  const [name,  setName]  = useState("");
  const [email, setEmail] = useState("");
  const [color, setColor] = useState(()=>getNextColor(team));
  const handleSave = () => {
    if (!name.trim())  return alert("Introduz o nome.");
    if (!email.trim()) return alert("Introduz o email.");
    if (!isValidEmail(email)) return alert("Email inválido.");
    if (team.some(m=>m.name.toLowerCase()===name.trim().toLowerCase())) return alert("Já existe um membro com este nome.");
    if (team.some(m=>m.email&&m.email.toLowerCase()===email.trim().toLowerCase())) return alert("Já existe um membro com este email.");
    onAdd(name.trim(),color,email.trim());
  };
  return (
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">＋ Adicionar Membro<button className="modal-close" onClick={onClose}>×</button></div>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:22,padding:"14px 16px",background:"#f8fafc",borderRadius:10}}>
          <div className="avatar-preview" style={{background:color}}>{toInitials(name)||"?"}</div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:name?"#0f172a":"#94a3b8"}}>{name||"Nome completo"}</div>
            <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{email||"email@exemplo.com"}</div>
          </div>
        </div>
        <div className="form-group"><label className="form-label">Nome completo *</label><input type="text" className="form-input" placeholder="ex. Maria Silva" value={name} onChange={e=>setName(e.target.value)} autoFocus/></div>
        <div className="form-group">
          <label className="form-label">Email * <span style={{fontWeight:400,color:"#94a3b8"}}>(conta Google para início de sessão)</span></label>
          <input type="email" className="form-input" placeholder="ex. maria.silva@gmail.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleSave();}}/>
        </div>
        <div className="form-group"><label className="form-label">Cor</label><div className="color-grid">{COLOR_PALETTE.map(c=><div key={c} className={`color-swatch${color===c?" selected":""}`} style={{background:c}} onClick={()=>setColor(c)}/>)}</div></div>
        <div className="modal-actions"><button className="btn-cancel" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={handleSave}>Adicionar</button></div>
      </div>
    </div>
  );
}
/* ─── PENDING LIST VIEW ─── */
function PendingListView({ vacations, team, userEmail, onApprove, onReject, onDelete, onBack }) {
  const pending = [...vacations]
    .filter(v => v.status === "pending" && canApprove(userEmail, v.member))
    .sort((a, b) => a.startDate.localeCompare(b.startDate));
  return (
    <div>
      <div className="pending-view-header">
        <button className="pending-view-back" onClick={onBack}>← Voltar</button>
        <div>
          <div className="pending-view-title">⏳ Férias Pendentes</div>
          <div className="pending-view-sub">{pending.length} registo{pending.length !== 1 ? "s" : ""}</div>
        </div>
      </div>
      {pending.length === 0 ? (
        <div className="empty"><div className="empty-icon">🎉</div><div className="empty-title">Nenhum pedido pendente</div></div>
      ) : (
        <div className="vac-list">
          {pending.map(v => {
            const m = team.find(x => x.name === v.member) || { name: v.member, color: "#94a3b8", initials: v.member[0] };
            const wd = wdays(v.startDate, v.endDate);
            const cd = expand(v.startDate, v.endDate).length;
            return (
              <div key={v.id} className="vac-card pending">
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                  <div className="initials" style={{ background: m.color, width: 28, height: 28, fontSize: 11 }}>{m.initials}</div>
                  <span style={{ fontWeight: 700, fontSize: 14, color: "#0f172a" }}>{v.member}</span>
                </div>
                <div className="vac-card-dates">
                  <div className="vac-date-range">{fmt(v.startDate, v.endDate)}</div>
                  <div className="vac-meta">{wd} dia{wd !== 1 ? "s" : ""} útei{wd !== 1 ? "s" : "l"}{cd !== wd ? ` (${cd} dias corridos)` : ""}</div>
                  {v.note && <div className="vac-note">💬 {v.note}</div>}
                </div>
                <div className="vac-card-actions">
                  <button className="btn-approve" onClick={() => onApprove(v.id)}>✅ Aprovar</button>
                  <button className="btn-reject"  onClick={() => onReject(v.id)}>❌ Rejeitar</button>
                  <button className="btn-danger-ghost" onClick={() => onDelete(v.id)}>🗑️</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
/* ─── TEAM VIEW ─── */
function TeamView({ vacations, team, year, month, onPrev, onNext, onPersonClick, onAdd, userEmail, onCycleStatus }) {
  const now=today(), numDays=dim(year,month);
  const dayMap=useMemo(()=>{ const m={}; vacations.filter(v=>v.startDate&&v.endDate).forEach(v=>expand(v.startDate,v.endDate).forEach(d=>{const k=`${d}__${v.member}`;if(!m[k])m[k]=v;})); return m; },[vacations]);
  const days=useMemo(()=>Array.from({length:numDays},(_,i)=>{const d=i+1,s=ds(year,month,d),dow=parse(s).getDay();return{d,s,dow,isWeekend:dow===0||dow===6,isToday:s===now};}),[year,month,numDays,now]);
  const offToday=team.filter(m=>dayMap[`${now}__${m.name}`]);
  const totAppr=vacations.filter(v=>v.status==="approved").reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
  const totPend=vacations.filter(v=>v.status==="pending" ).reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
  return (
    <div>
      <div className="summary-strip">
        <div className="summary-card"><div className="summary-icon">🏖️</div><div><div className="summary-val" style={{color:"#4f46e5"}}>{vacations.length}</div><div className="summary-lbl">Total</div></div></div>
        <div className="summary-card"><div className="summary-icon">✅</div><div><div className="summary-val" style={{color:"#16a34a"}}>{totAppr}</div><div className="summary-lbl">Dias aprovados</div></div></div>
        <div className="summary-card"><div className="summary-icon">⏳</div><div><div className="summary-val" style={{color:"#d97706"}}>{totPend}</div><div className="summary-lbl">Dias pendentes</div></div></div>
        <div className="summary-card"><div className="summary-icon">👤</div><div><div className="summary-val" style={{color:offToday.length>0?"#dc2626":"#94a3b8"}}>{offToday.length}</div><div className="summary-lbl">Ausentes hoje</div></div></div>
        <div className="summary-card"><div className="summary-icon">🧑‍🤝‍🧑</div><div><div className="summary-val" style={{color:"#4f46e5"}}>{team.length}</div><div className="summary-lbl">Equipa</div></div></div>
      </div>
      <div className="page-header">
        <div><div className="page-title">Visão Geral da Equipa</div><div className="page-subtitle">{offToday.length>0?`Hoje ausente${offToday.length!==1?"s":""}: ${offToday.map(m=>m.name.split(" ")[0]).join(", ")}`:"Toda a equipa presente hoje"}</div></div>
        <div className="header-actions">
          <div className="month-nav"><button className="month-nav-btn" onClick={onPrev}>◀</button><span className="month-label">{MONTHS_EN[month]} {year}</span><button className="month-nav-btn" onClick={onNext}>▶</button></div>
          <button className="btn btn-primary" onClick={onAdd}>＋ Adicionar Férias</button>
        </div>
      </div>
      <div className="gantt-wrap"><div className="gantt-scroll">
        <table className="gantt-table">
          <thead><tr>
            <th className="gantt-name-th">Membro</th>
            {days.map(({d,dow,isWeekend,isToday})=>(
              <th key={d} className={`gantt-day-th${isWeekend?" weekend":""}${isToday?" today-col":""}`}>
                <div className={isToday?"today-ring":"day-num"}>{d}</div>
                <div className="day-name">{WEEKDAYS[dow][0]}</div>
              </th>
            ))}
          </tr></thead>
          <tbody>
            {team.map(member=>(
              <tr key={member.id} className="gantt-row">
                <td className="gantt-name-td" onClick={()=>onPersonClick(member.name)}>
                  <div className="gantt-member-inner"><div className="initials" style={{background:member.color}}>{member.initials}</div><span className="member-first">{member.name.split(" ")[0]}</span></div>
                </td>
                {days.map(({d,s,isWeekend,isToday})=>{
                  const entry=dayMap[`${s}__${member.name}`];
                  let pS={},pC="";
                  if(entry){
                    const pv=ds(year,month,d-1),nx=ds(year,month,d+1);
                    const hP=d>1&&dayMap[`${pv}__${member.name}`]?.id===entry.id;
                    const hN=d<numDays&&dayMap[`${nx}__${member.name}`]?.id===entry.id;
                    pS={background:STATUS_COLORS[entry.status]||member.color,borderRadius:`${!hP?"5px":"0"} ${!hN?"5px":"0"} ${!hN?"5px":"0"} ${!hP?"5px":"0"}`,left:hP?"0":"2px",right:hN?"0":"2px"};
                    pC=entry.status==="pending"?"pending-pill":entry.status==="rejected"?"rejected-pill":"";
                  }
                  return(
                    <td key={d} className={`gantt-cell-td${isWeekend?" weekend":""}${isToday?" today-col":""}`}>
                      {entry&&<div className="vac-pill" title={`${member.name}: ${fmt(entry.startDate,entry.endDate)} — ${entry.status}${entry.note?` · "${entry.note}"`:""}`}><div className={`vac-pill-inner${pC?" "+pC:""}`} style={pS}/></div>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div></div>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:12}}>
        <div className="legend">
          <div className="legend-item"><div className="legend-swatch" style={{background:"#16a34a"}}/> Aprovado</div>
          <div className="legend-item"><div className="legend-swatch" style={{background:"#f59e0b",opacity:0.75}}/> Pendente</div>
          <div className="legend-item"><div className="legend-swatch" style={{background:"#ef4444",opacity:0.6}}/> Rejeitado</div>
          <div className="legend-item"><div className="legend-swatch" style={{background:"#f1f5f9",border:"1px dashed #cbd5e1"}}/> Fim de semana</div>
        </div>
      </div>
    </div>
  );
}
/* ─── PERSON VIEW ─── */
function PersonView({ member, vacations, onAdd, onEdit, onDelete, onCycleStatus, userEmail }) {
  const sorted=[...vacations].sort((a,b)=>a.startDate.localeCompare(b.startDate));
  const stats=useMemo(()=>{
    const tot=vacations.reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
    const appr=vacations.filter(v=>v.status==="approved").reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
    const pend=vacations.filter(v=>v.status==="pending" ).reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
    const rej =vacations.filter(v=>v.status==="rejected").reduce((s,v)=>s+wdays(v.startDate,v.endDate),0);
    return{tot,appr,pend,rej};
  },[vacations]);
  const userCanApprove = canApprove(userEmail, member.name);
  return (
    <div>
      <div className="person-header">
        <div className="person-avatar" style={{background:member.color}}>{member.initials}</div>
        <div style={{flex:1}}>
          <div className="person-name">{member.name}</div>
          {member.email&&<div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>✉️ {member.email}</div>}
          {member.name===TIAGO_NAME&&<div style={{fontSize:12,color:"#16a34a",fontWeight:600,marginTop:3}}>⭐ Super Admin — férias aprovadas automaticamente</div>}
          {member.name===CATIA_NAME&&<div style={{fontSize:12,color:"#7c3aed",fontWeight:600,marginTop:3}}>🔑 Admin — aprova toda a equipa exceto Tiago</div>}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
            <span className="person-stat-pill stat-total">📅 {stats.tot} dia{stats.tot!==1?"s":""} total</span>
            {stats.appr>0&&<span className="person-stat-pill stat-approved">✅ {stats.appr} aprovado{stats.appr!==1?"s":""}</span>}
            {stats.pend>0&&<span className="person-stat-pill stat-pending">⏳ {stats.pend} pendente{stats.pend!==1?"s":""}</span>}
            {stats.rej >0&&<span className="person-stat-pill stat-rejected">❌ {stats.rej} rejeitado{stats.rej!==1?"s":""}</span>}
          </div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}>＋ Adicionar Férias</button>
      </div>
      {sorted.length===0 ? (
        <div className="empty"><div className="empty-icon">🏖️</div><div className="empty-title">Sem férias marcadas</div><div style={{marginTop:16}}><button className="btn btn-primary" onClick={onAdd}>＋ Adicionar</button></div></div>
      ) : (
        <div className="vac-list">
          {sorted.map(v=>{
            const wd=wdays(v.startDate,v.endDate),cd=expand(v.startDate,v.endDate).length;
            return (
              <div key={v.id} className={`vac-card ${v.status}`}>
                <div className="vac-card-dates">
                  <div className="vac-date-range">{fmt(v.startDate,v.endDate)}</div>
                  <div className="vac-meta">{wd} dia{wd!==1?"s":""} útei{wd!==1?"s":"l"}{cd!==wd?` (${cd} dias corridos)`:""}</div>
                  {v.note&&<div className="vac-note">💬 {v.note}</div>}
                </div>
                <div className="vac-card-actions">
                  <span className={`status-badge ${v.status}${userCanApprove?" clickable":""}`} onClick={userCanApprove?()=>onCycleStatus(v.id):undefined} title={userCanApprove?"Clica para alterar: Pendente → Aprovado → Rejeitado":v.status==="approved"?"Aprovado":v.status==="pending"?"Pendente":"Rejeitado"}>
                    {v.status==="approved"?"✅ Aprovado":v.status==="pending"?"⏳ Pendente":"❌ Rejeitado"}
                  </span>
                  <button className="btn-edit-ghost" onClick={()=>onEdit(v)}>✏️ Editar</button>
                  <button className="btn-danger-ghost" onClick={()=>onDelete(v.id)}>🗑️</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
/* ─── VACATION MODAL ─── */
function VacationModal({ mode, defaultMember, entry, team, onSave, onClose, userEmail }) {
  const [member,    setMember]    = useState(entry?.member    || defaultMember || (team[0]?.name||""));
  const [startDate, setStartDate] = useState(entry?.startDate || "");
  const [endDate,   setEndDate]   = useState(entry?.endDate   || "");
  const [status,    setStatus]    = useState(entry?.status    || "pending");
  const [note,      setNote]      = useState(entry?.note      || "");
  const wd=startDate&&endDate&&endDate>=startDate?wdays(startDate,endDate):null;
  const adminUser  = isAnyAdmin(userEmail);
  const isTiagoNew = member===TIAGO_NAME && mode==='add';
  const showSel    = !isTiagoNew && (adminUser || mode==='edit');
  const handleSave = () => {
    if(!member||!startDate||!endDate) return alert("Preenche todos os campos obrigatórios.");
    if(endDate<startDate) return alert("A data de fim deve ser igual ou posterior à data de início.");
    const finalStatus = isTiagoNew ? 'approved' : (!adminUser&&mode==='add') ? 'pending' : status;
    onSave({id:entry?.id,member,startDate,endDate,status:finalStatus,note:note.trim()});
  };
  return (
    <div className="modal-overlay" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modal-title">{mode==="edit"?"✏️ Editar Férias":"＋ Adicionar Férias"}<button className="modal-close" onClick={onClose}>×</button></div>
        <div className="form-group"><label className="form-label">Membro *</label>
          <select className="form-input" value={member} onChange={e=>setMember(e.target.value)}>
            {team.map(m=><option key={m.id} value={m.name}>{m.name}</option>)}
          </select>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Data início *</label><input type="date" className="form-input" value={startDate} onChange={e=>{setStartDate(e.target.value);if(!endDate||e.target.value>endDate)setEndDate(e.target.value);}}/></div>
          <div className="form-group"><label className="form-label">Data fim *</label><input type="date" className="form-input" value={endDate} min={startDate} onChange={e=>setEndDate(e.target.value)}/></div>
        </div>
        {wd!==null&&<div style={{fontSize:12,color:"#64748b",marginTop:-10,marginBottom:14,paddingLeft:2}}>📅 {wd} dia{wd!==1?"s":""} útei{wd!==1?"s":"l"}</div>}
        <div className="form-group"><label className="form-label">Estado</label>
          {isTiagoNew ? <div className="status-locked approved">✅ Aprovado automaticamente — férias do Tiago são sempre verdes</div>
           : showSel ? <div className="status-selector">{["pending","approved","rejected"].map(s=><div key={s} className={`status-option${status===s?" sel-"+s:""}`} onClick={()=>setStatus(s)}>{s==="pending"?"⏳ Pendente":s==="approved"?"✅ Aprovado":"❌ Rejeitado"}</div>)}</div>
           : <div className="status-locked pending">⏳ Pendente — aguarda aprovação</div>}
        </div>
        <div className="form-group"><label className="form-label">Nota <span style={{fontWeight:400,color:"#94a3b8"}}>(opcional)</span></label><input type="text" className="form-input" placeholder="ex. Férias de verão, Baixa médica…" value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleSave();}}/></div>
        <div className="modal-actions"><button className="btn-cancel" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={handleSave}>{mode==="edit"?"Guardar":"Adicionar"}</button></div>
      </div>
    </div>
  );
}
const container = document.getElementById("root");
const root = ReactDOM.createRoot(container);
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);
</script>
</body>
</html>
